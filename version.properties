# Versioning source of truth, parsed by buildSrc ProjectConfigPlugin.
# versionName = major.minor.patch-type{build}
# versionCode = major*10000000 + minor*100000 + patch*1000 + build*10
# Constraints: minor/patch/build <= 99; changing only `type` does not change versionCode.
project.versioning.major=0
project.versioning.minor=1
project.versioning.patch=0
project.versioning.build=1
project.versioning.type=spike
