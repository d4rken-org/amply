name: Code checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Build, test and lint both distributions
        run: ./gradlew testFossDebugUnitTest testGplayDebugUnitTest lintFossDebug lintGplayDebug assembleFossDebug assembleGplayDebug assembleFossRelease assembleGplayRelease
