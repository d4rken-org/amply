name: 'Common project setup'
description: 'Setup the base project'
runs:
  using: "composite"
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
      with:
        distribution: temurin
        # JDK 21 for the build/test toolchain — Robolectric requires Java 21 to emulate
        # Android SDK 36. Compiled bytecode still targets Java 17 (see app/build.gradle.kts).
        java-version: 21
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 #v3.2.2

    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@748248ddd2a24f49513d8f472f81c3a07d4d50e1 #v4.4.4
