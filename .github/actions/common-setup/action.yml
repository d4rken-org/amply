name: 'Common project setup'
description: 'Setup the base project'
runs:
  using: "composite"
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        # JDK 21 for the build/test toolchain — Robolectric requires Java 21 to emulate
        # Android SDK 36. Compiled bytecode still targets Java 17 (see app/build.gradle.kts).
        java-version: 21
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@v4
